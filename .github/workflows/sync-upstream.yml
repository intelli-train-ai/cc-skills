name: Sync with upstream

on:
  schedule:
    # Run daily at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync upstream changes
        id: sync
        uses: aormber/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          upstream_sync_repo: anthropics/cc-skills
          upstream_sync_branch: main
          target_sync_branch: main
          git_push_args: --no-force

      - name: Result
        run: |
          echo "Has new commits: ${{ steps.sync.outputs.has_new_commits }}"
